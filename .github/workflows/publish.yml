name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: publish

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Cache disabled to prevent cache-poisoning attacks on release artifacts.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    # Requires a 'pypi' environment configured in GitHub Settings:
    # Settings > Environments > New environment > pypi
    # Add required reviewers and restrict to v* tags for protection.
    environment:
      name: pypi
      url: https://pypi.org/p/{{cookiecutter.package_name}}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1